# This is a basic workflow to help you get started with Actions
name: E2E Test

on:
  push:
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '26 9 * * *'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  ubuntu:
    strategy:
      fail-fast: true
      matrix:
        os_name:
          - ubuntu
        os_version:
          - 24.04

    runs-on: ubuntu-latest
    container: ${{ matrix.os_name }}:${{ matrix.os_version }}

    steps:
    - name: Install requirements
      run: |
        apt-get update
        apt-get install -y curl gcc git gnupg make tar

    - uses: actions/checkout@v6

    - name: Install dotfiles from branch
      run: |
        cp -a "${GITHUB_WORKSPACE}" /root/.dotfiles
        env LANG=en_US.utf8 HOME=/root bash /root/.dotfiles/install
