redactions = ["MISE_GITHUB_TOKEN"]

[settings]
color_theme = "catppuccin"
minimum_release_age = "7d"

[bootstrap.packages]
"apt:build-essential" = "latest"
"apt:git" = "latest"
"apt:gnupg" = "latest"
"apt:tar" = "latest"

[bootstrap.hooks.pre-dotfiles]
run = """
mkdir -p -m 700 ~/.ssh
mkdir -p ~/{bin,ghe,github,github_hpeprod,work,docker,namespace}
mkdir -p ~/ghe/{hpe,yoshio-sugiyama}
mkdir -p ~/github/{HPE-TA,IMOKURI,others}
mkdir -p ~/github_hpeprod/yoshio-sugiyama_hpeprod
"""

[dotfiles]
"~/.vimrc" = {}
"~/.config/*" = {}

"~/.bashrc/local-bashrc" = { block = '''
if [[ -f ~/.config/bashrc ]]; then
  . ~/.config/bashrc
fi
''' }
"~/.ssh/config/local-ssh" = { line = 'Include ~/.config/ssh/*.conf' }

[bootstrap.repos]
"~/.dotfiles" = { url = "https://github.com/IMOKURI/dotfiles.git" }
"~/src/bashmarks" = { url = "https://github.com/huyng/bashmarks.git" }
"~/src/cat-bat" = { url = "https://github.com/catppuccin/bat.git" }

[tasks.bootstrap]
depends = ["mise-token", "bashmarks", "bat-themes"]

[tasks.mise-token]
run = """
#!/usr/bin/env bash
if ! grep -q 'export MISE_GITHUB_TOKEN=' "${HOME}/.bashrc"; then echo 'export MISE_GITHUB_TOKEN="{{env.MISE_GITHUB_TOKEN}}"' >> "${HOME}/.bashrc"; fi
"""

[tasks.bashmarks]
run = """
cd ~/src/bashmarks && make install
sed -i 's/^alias l=/# &/' ${HOME}/.bashrc
"""

[tasks.bat-themes]
run = """
mkdir -p "$(bat --config-dir)/themes"
cp -f ~/src/cat-bat/themes/*.tmTheme "$(bat --config-dir)/themes"
bat cache --build
"""

[settings.npm]
package_manager = "pnpm"

[tools]
ansible-core = { version = "latest", uvx_args = "--with ansible --with cryptography --with kubernetes --with passlib" }
bat = "latest"
copilot = "latest"
fd = "latest"
fzf = "latest"
git-lfs = "latest"
github-cli = "latest"
helm = "latest"
helmfile = "latest"
jq = "latest"
kubectl = "latest"
lazygit = "latest"
lua-language-server = "latest"
neovim = "latest"
node = "lts"
packer = "latest"
pnpm = "latest"
prettier = "latest"
python = "3.14"
ripgrep = "latest"
ruff = "latest"
shfmt = "latest"
starship = "latest"
stern = "latest"
stylua = "latest"
terraform = "latest"
ty = "latest"
uv = "latest"
wrangler = "latest"
yq = "latest"

"npm:bash-language-server" = "latest"
"npm:dockerfile-language-server-nodejs" = "latest"
"npm:doctoc" = "latest"
"npm:tree-sitter-cli" = "latest"
"npm:@astrojs/language-server" = "latest"
"npm:@microsoft/compose-language-service" = "latest"

"pipx:huggingface-hub" = "latest"
"pipx:kaggle" = "latest"
"pipx:wandb" = "latest"
